__meta:
  id: "en-US"
  name: "English"
  nativeName: "English"

no-permission: "<red>You do not have permission to do that."

command:
  usage:
    search: "<red>Usage: /hdb search <query> or /hdb search <text|tag|category|collection|head> ..."
    give: "<red>Usage: /hdb give <id> [player] or /hdb give <player> <id>"
    console-give: "<red>Console usage: /hdb give <id> <player> or /hdb give <player> <id>"
    info-console: "<red>Usage: /hdb info <id>. Console cannot inspect a held item."
    open-console-self: "<red>Usage: /hdb open <category> <player>. Console cannot open its own GUI."
    open-console-target: "<red>Usage: /hdb open <category> <player>. Console must specify a player."
    random-console: "<red>Usage: /hdb random [amount] [category] <player>. Console must specify a player."
    itemcache: "<red>Usage: /hdb itemcache clear"

  error:
    invalid-argument: "<red>{message}"
    unknown-head: "<red>Unknown HeadDB head: <gold>{id}"
    player-not-online: "<red>Player is not online: <gold>{player}"
    target-empty: "<red>Target player cannot be empty."
    no-give-others: "<red>You do not have permission to give heads to other players."
    inventory-full: "<red>Could not give head because <gold>{player}</gold><red>'s inventory is full."
    search-gui-not-ready: "<red>Search GUI is not implemented yet."
    unknown-category: "<red>Unknown category: <gold>{category}"
    held-head-required: "<red>Hold a HeadDB head or provide an ID."
    random-empty: "<red>No heads matched the random command filters."
    no-permission: "<red>You do not have permission to do that."
    unknown-command: "<red>Unknown command."
    no-handler: "<red>No handler is bound for this command."
    invalid-usage: "<red>Invalid usage."
    valid-usages: "<gray>Valid usages:"

  give:
    success: "<gray>Gave <gold>{head}</gold> to <gold>{player}</gold>."
    received: "<gray>You received <gold>{head}</gold> from HeadDB."

  reload:
    started: "<gray>Reloading HeadDB..."
    success: "<gold>HeadDB reloaded."
    failed: "<red>Failed to reload HeadDB. Check console for details."

  refresh:
    already-running: "<red>HeadDB refresh is already running."
    started: "<gold>HeadDB remote refresh started."

  verify:
    already-running: "<red>HeadDB remote verification could not start because another database operation is running."
    started: "<gold>Started HeadDB remote verification."
    success: "<gold>HeadDB remote verification passed."
    failed: "<red>HeadDB remote verification failed: <gray>{message}"

  itemcache:
    cleared: "<gold>Cleared HeadDB item cache. Removed <gray>{count}</gray><gold> cached item(s)."

economy:
  invalid-funds: "<red>You need <gold>{price}</gold><red> to buy <gold>{head}</gold><red>."
  purchased: "<gray>Purchased <gold>{head}</gold> for <gold>{price}</gold>."

gui:
  language:
    changed: "<gray>Language changed to <gold>{locale}</gold>."
    reset: "<gray>Language reset to the default locale."
