name: Bug Report
description: Report a reproducible plugin bug.
title: "[Bug]: "
labels:
  - bug
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out the required fields so the issue can be reproduced and fixed without guessing.

        Do not paste secrets, private tokens, database files, or full server logs unless you have reviewed and redacted them.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest available build I am testing.
          required: true
        - label: I have included only relevant logs/config snippets and redacted private data.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug in one or two paragraphs.
      placeholder: Clicking a category opens an empty menu even though the database is loaded.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the bug.
      placeholder: |
        1. Start the server with ...
        2. Grant the player ...
        3. Run /hdb ...
        4. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Startup / shutdown
        - Commands
        - Main GUI
        - Search / filters
        - Category browsing
        - Favorites
        - More Heads / custom heads
        - More Categories / custom categories
        - Player heads
        - Head editing / admin mode
        - Economy / Vault
        - Local storage / SQLite
        - Remote database / manifest / mirror
        - Permissions
        - Localization / messages
        - Other
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version or commit
      description: Use the jar version, GitHub Actions artifact name, or commit SHA.
      placeholder: 7.0.0 / abc1234 / HeadDB-7.0.0-abc1234.jar
    validations:
      required: true

  - type: dropdown
    id: server-software
    attributes:
      label: Server software
      options:
        - Paper
        - Folia
        - Other fork
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Server version
      placeholder: Paper 1.21.11 build ...
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      description: Paste the output of java -version if possible.
      placeholder: Java 25.0.x
    validations:
      required: true

  - type: input
    id: client-version
    attributes:
      label: Minecraft client version
      placeholder: 1.21.11
    validations:
      required: false

  - type: textarea
    id: plugins
    attributes:
      label: Relevant plugins
      description: Include permission/economy/plugin-management plugins and any plugin that may affect GUIs, heads, storage, or commands.
      placeholder: |
        LuckPerms ...
        Vault ...
        Economy provider ...
    validations:
      required: false

  - type: textarea
    id: permissions
    attributes:
      label: Permissions tested
      description: Include the exact permissions granted to the affected player or group.
      placeholder: |
        headdb.basic
        headdb.more-categories
        headdb.head.take
      render: text
    validations:
      required: false

  - type: dropdown
    id: economy-enabled
    attributes:
      label: Economy enabled?
      options:
        - "No"
        - "Yes, Vault is installed and hooked"
        - "Yes, but Vault/economy provider is missing"
        - Not relevant
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Paste only relevant config sections, such as config.yml, economy.yml, gui.yml, or messages overrides.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack traces
      description: Paste short relevant snippets here, or link to a paste from https://pastes.dev. Do not paste unrelated full logs.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: Attach screenshots or a short recording if the bug is visual.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other useful details, such as whether this happens after restart, only for OP players, only with cache loaded, or only with a specific category/head.
    validations:
      required: false
