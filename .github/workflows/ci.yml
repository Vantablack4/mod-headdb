name: Mod CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - ".github/**"
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main, master]
    paths-ignore:
      - ".github/**"
      - "**/*.md"
      - "docs/**"

concurrency:
  group: mod-headdb-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Checkout mod-gateway dependency
        uses: actions/checkout@v6
        with:
          repository: Vantablack4/mod-gateway
          path: mod-gateway
          token: ${{ secrets.REPO_ACCESS_TOKEN || github.token }}
      - name: Checkout mod-characters dependency
        uses: actions/checkout@v6
        with:
          repository: Vantablack4/mod-characters
          path: mod-characters
          token: ${{ secrets.REPO_ACCESS_TOKEN || github.token }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew build
