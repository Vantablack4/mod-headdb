name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - release
  push:
    branches:
      - main
      - master
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-core:
    name: API/Core · Java 21
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          !contains(github.event.head_commit.message, '[ci skip]') &&
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[no ci]') &&
          !contains(github.event.head_commit.message, '[skip actions]') &&
          !contains(github.event.head_commit.message, '[actions skip]')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Verify API and core
        run: mvn -B -ntp -pl headdb-api,headdb-core -am verify

  paper:
    name: Paper plugin · Java 25
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          !contains(github.event.head_commit.message, '[ci skip]') &&
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[no ci]') &&
          !contains(github.event.head_commit.message, '[skip actions]') &&
          !contains(github.event.head_commit.message, '[actions skip]')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Package Paper plugin
        run: mvn -B -ntp -pl headdb-platforms/headdb-paper -am package

      - name: Inspect packaged plugin
        shell: bash
        run: |
          set -euo pipefail

          jar_path="headdb-platforms/headdb-paper/target/HeadDB.jar"
          test -s "$jar_path"

          jar tf "$jar_path" | grep -Fxq 'paper-plugin.yml'
          jar tf "$jar_path" | grep -Fxq 'messages/en-US.yml'
          jar tf "$jar_path" | grep -Fxq 'gui.yml'
          jar tf "$jar_path" | grep -Fxq 'economy.yml'
          jar tf "$jar_path" | grep -Fxq 'git.properties'

          unzip -p "$jar_path" paper-plugin.yml > /tmp/paper-plugin.yml

          if grep -Eq '@project\.version@|\$\{project\.version\}|\$\{headdb\.build\.version\}' /tmp/paper-plugin.yml; then
            echo 'paper-plugin.yml version was not filtered.' >&2
            exit 1
          fi

          grep -Fq "main: io.github.silentdevelopment.headdb.paper.HeadDBPlugin" /tmp/paper-plugin.yml
          grep -Fq "api-version: '1.21'" /tmp/paper-plugin.yml
          grep -Fq 'Vault:' /tmp/paper-plugin.yml
          grep -Fq 'required: false' /tmp/paper-plugin.yml

          unzip -p "$jar_path" git.properties > /tmp/git.properties
          grep -Fq 'headdb.build.version=' /tmp/git.properties
          grep -Fq 'headdb.build.base-version=' /tmp/git.properties
          grep -Fq 'headdb.build.number=' /tmp/git.properties
          grep -Fq 'headdb.build.attempt=' /tmp/git.properties
          grep -Fq 'headdb.build.commit=' /tmp/git.properties

      - name: Upload CI jar
        uses: actions/upload-artifact@v4
        with:
          name: HeadDB-paper-${{ github.sha }}
          path: headdb-platforms/headdb-paper/target/HeadDB.jar
          if-no-files-found: error
          retention-days: 14

  licenses:
    name: License files
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          !contains(github.event.head_commit.message, '[ci skip]') &&
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[no ci]') &&
          !contains(github.event.head_commit.message, '[skip actions]') &&
          !contains(github.event.head_commit.message, '[actions skip]')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify license layout
        shell: bash
        run: |
          set -euo pipefail

          test -f LICENSE
          test -f LICENSES/Apache-2.0.txt
          test -f LICENSES/GPL-3.0-or-later.txt

          grep -Eq 'Apache License|Apache-2.0' LICENSES/Apache-2.0.txt
          grep -Eq 'GNU GENERAL PUBLIC LICENSE|GPL' LICENSES/GPL-3.0-or-later.txt

  remote-smoke:
    name: Remote catalog smoke
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          !contains(github.event.head_commit.message, '[ci skip]') &&
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[no ci]') &&
          !contains(github.event.head_commit.message, '[skip actions]') &&
          !contains(github.event.head_commit.message, '[actions skip]')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate live manifest and artifact reachability
        env:
          MANIFEST_URL: https://data.headsdb.com/manifest.json
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          manifest_url = os.environ['MANIFEST_URL']

          def read_json(url):
              request = urllib.request.Request(url, headers={'User-Agent': 'HeadDB-CI/1.0'})
              with urllib.request.urlopen(request, timeout=20) as response:
                  if response.status != 200:
                      raise RuntimeError(f'{url} returned HTTP {response.status}')
                  return json.loads(response.read().decode('utf-8'))

          def require(condition, message):
              if not condition:
                  raise RuntimeError(message)

          def artifact_url(manifest, resource_id):
              mirrors = sorted(manifest['mirrors'], key=lambda mirror: mirror.get('priority', 0))
              base = mirrors[0]['url']
              path = manifest['resources'][resource_id]['index']['path']
              return urllib.parse.urljoin(base, path)

          def check_reachable(url):
              request = urllib.request.Request(url, method='HEAD', headers={'User-Agent': 'HeadDB-CI/1.0'})
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      require(200 <= response.status < 400, f'{url} returned HTTP {response.status}')
                      return
              except urllib.error.HTTPError as error:
                  if error.code not in (403, 405):
                      raise

              request = urllib.request.Request(url, headers={'User-Agent': 'HeadDB-CI/1.0', 'Range': 'bytes=0-0'})
              with urllib.request.urlopen(request, timeout=20) as response:
                  require(response.status in (200, 206), f'{url} returned HTTP {response.status}')

          manifest = read_json(manifest_url)

          require(manifest.get('schema') == 1, 'manifest schema must be 1')
          require(manifest.get('id') == 'heads', 'manifest id must be heads')
          require(isinstance(manifest.get('revision'), int), 'manifest revision must be an integer')
          require(isinstance(manifest.get('timestamp'), str) and manifest['timestamp'], 'manifest timestamp is required')
          require(isinstance(manifest.get('mirrors'), list) and manifest['mirrors'], 'manifest mirrors are required')
          require(isinstance(manifest.get('resources'), dict), 'manifest resources are required')

          for resource_id in ('catalog', 'revocations'):
              resource = manifest['resources'].get(resource_id)
              require(isinstance(resource, dict), f'{resource_id} resource is required')
              index = resource.get('index')
              require(isinstance(index, dict), f'{resource_id} index is required')
              require(isinstance(index.get('path'), str) and index['path'], f'{resource_id} index path is required')
              integrity = index.get('integrity')
              require(isinstance(integrity, dict), f'{resource_id} index integrity is required')
              require(integrity.get('algorithm') == 'sha256', f'{resource_id} integrity algorithm must be sha256')
              require(isinstance(integrity.get('digest'), str) and len(integrity['digest']) == 64, f'{resource_id} digest must be a SHA-256 hex string')
              require(isinstance(integrity.get('bytes'), int) and integrity['bytes'] >= 0, f'{resource_id} bytes must be non-negative')
              check_reachable(artifact_url(manifest, resource_id))

          print(f"Validated manifest revision {manifest['revision']} from {manifest_url}")
          PY