name: Release

on:
  push:
    branches:
      - main
      - master
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Paper plugin
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          !contains(github.event.head_commit.message, '[ci skip]') &&
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[no ci]') &&
          !contains(github.event.head_commit.message, '[skip actions]') &&
          !contains(github.event.head_commit.message, '[actions skip]')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(mvn -B -ntp help:evaluate -Dexpression=project.version -q -DforceStdout)"
          short_sha="${GITHUB_SHA::7}"

          if [[ "$base_version" == *-SNAPSHOT ]]; then
            echo "Snapshot versions are not released." >&2
            exit 1
          fi

          git fetch --tags --force

          escaped_base="$(printf '%s\n' "$base_version" | sed 's/[][\.^$*+?{}|()]/\\&/g')"

          latest_build="$(
            {
              git tag --list "v${base_version}+build.*" |
                sed -E "s/^v${escaped_base}\+build\.([0-9]+)$/\1/" |
                grep -E '^[0-9]+$' ||
                true
            } |
              sort -n |
              tail -n 1
          )"

          if [[ -z "$latest_build" ]]; then
            build_number="1"
          else
            build_number="$((latest_build + 1))"
          fi

          build_version="${base_version}+build.${build_number}"
          tag="v${build_version}"

          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "build_attempt=${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Package Paper plugin
        run: |
          mvn -B -ntp -pl headdb-platforms/headdb-paper -am clean package \
            -Dheaddb.build.version="${{ steps.version.outputs.build_version }}" \
            -Dheaddb.build.number="${{ steps.version.outputs.build_number }}" \
            -Dheaddb.build.attempt="${{ steps.version.outputs.build_attempt }}" \
            -Dheaddb.build.commit="${{ github.sha }}"

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          jar_name="HeadDB-${{ steps.version.outputs.build_version }}.jar"

          cp headdb-platforms/headdb-paper/target/HeadDB.jar "$jar_name"
          sha256sum "$jar_name" > "${jar_name}.sha256"

          test -f LICENSE
          test -f LICENSES/Apache-2.0.txt
          test -f LICENSES/GPL-3.0-or-later.txt

          echo "jar=${jar_name}" >> "$GITHUB_OUTPUT"
          echo "sha=${jar_name}.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          prerelease_flag=""
          if [[ "${{ steps.version.outputs.base_version }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.assets.outputs.jar }}" \
            "${{ steps.assets.outputs.sha }}" \
            LICENSE \
            LICENSES/Apache-2.0.txt \
            LICENSES/GPL-3.0-or-later.txt \
            --target "${GITHUB_SHA}" \
            --title "HeadDB ${{ steps.version.outputs.build_version }}" \
            --notes "Build ${{ steps.version.outputs.build_version }} from commit ${GITHUB_SHA}." \
            ${prerelease_flag}